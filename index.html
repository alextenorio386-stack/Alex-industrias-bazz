<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex de Industrias Bazz | Salud & Wrestling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans leading-normal tracking-normal">

    <header class="relative bg-black text-white py-24 px-6 text-center border-b-4 border-blue-600">
        <h1 class="text-5xl md:text-7xl font-extrabold italic uppercase">
            ALEX DE INDUSTRIAS <span class="text-blue-500">BAZZ</span>
        </h1>
        <p class="text-lg md:text-2xl font-light text-gray-400 tracking-widest mt-4">
            SALUD • WRESTLING • PÉRDIDA DE PESO • COMEDIA FITNESS
        </p>
    </header>

    <section class="py-12 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-12">
        <div class="bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700">
            <img src="entrena-banner.jpg.jpeg" alt="Entrena" class="w-full h-72 object-cover">
            <div class="p-8 text-center">
                <h3 class="text-3xl font-bold mb-4 uppercase italic text-blue-500">Sección Entrena</h3>
                <a href="#" class="inline-block bg-white text-black px-10 py-4 rounded-full font-black uppercase hover:bg-blue-500 transition">¡Dale mambo!</a>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700">
            <img src="aprende-banner.jpg.jpeg" alt="Aprende" class="w-full h-72 object-cover">
            <div class="p-8 text-center">
                <h3 class="text-3xl font-bold mb-4 uppercase italic text-blue-500">Aprende y Evoluciona</h3>
                <a href="#" class="inline-block bg-blue-600 text-white px-10 py-4 rounded-full font-black uppercase hover:bg-blue-700 transition">Ver Artículos</a>
            </div>
        </div>
    </section>

    <footer class="bg-black text-center py-10 border-t border-gray-800 text-gray-500 text-xs">
        © 2026 ALEX DE INDUSTRIAS BAZZ | NO PAIN, NO GAIN, JUST FUN
    </footer>
</body>
</html>
